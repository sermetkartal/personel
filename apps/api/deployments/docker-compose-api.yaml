# docker-compose-api.yaml — Local development stack for the Personel Admin API
#
# Starts: Postgres 16, ClickHouse 24, MinIO, NATS JetStream, Vault (dev mode),
#         Keycloak 24, and the Admin API itself.
#
# Usage:
#   docker compose -f deployments/docker-compose-api.yaml up -d
#   docker compose -f deployments/docker-compose-api.yaml logs -f api
#
# Vault dev mode auto-unseals and provides a root token "root".
# DO NOT use Vault dev mode in any environment other than local development.

version: "3.9"

name: personel-dev

services:

  # ── Postgres 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personel
      POSTGRES_USER: personel
      POSTGRES_PASSWORD: personel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personel"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ClickHouse 24 ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: personel
      CLICKHOUSE_USER: personel
      CLICKHOUSE_PASSWORD: personel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "9001:9000"   # native protocol (mapped to 9001 to avoid MinIO conflict)
      - "8123:8123"   # HTTP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9090:9090"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create the required buckets on first start.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/screenshots;
        mc mb --ignore-existing local/dsr-responses;
        mc mb --ignore-existing local/destruction-reports;
        echo 'MinIO buckets ready';
      "

  # ── NATS JetStream ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # Monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Vault (dev mode) ────────────────────────────────────────────────────────
  # WARNING: Dev mode is NOT suitable for any environment beyond local development.
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Provision Vault: enable transit, create signing key, create AppRole.
  vault-init:
    image: hashicorp/vault:1.16
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    entrypoint: >
      /bin/sh -c "
        vault secrets enable transit || true;
        vault write -f transit/keys/control-plane-signing type=ed25519 || true;
        vault auth enable approle || true;
        vault write auth/approle/role/personel-api \
          token_policies=default \
          token_ttl=1h \
          token_max_ttl=4h \
          secret_id_ttl=10m \
          secret_id_num_uses=1 || true;
        vault write auth/approle/role/agent-enrollment \
          token_policies=default \
          token_ttl=5m \
          secret_id_ttl=1m \
          secret_id_num_uses=1 || true;
        ROLE_ID=$$(vault read -field=role_id auth/approle/role/personel-api/role-id);
        SECRET_ID=$$(vault write -f -field=secret_id auth/approle/role/personel-api/secret-id);
        echo \"VAULT_ROLE_ID=$$ROLE_ID\";
        echo \"VAULT_SECRET_ID=$$SECRET_ID\";
        echo 'Vault provisioned. Copy the above values into the api environment.';
      "
    restart: "no"

  # ── Keycloak 24 ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "8090:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Personel Admin API ──────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: final
    image: personel/api:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PERSONEL_CONFIG_PATH: /configs/api.yaml
      # Override DSN for container networking.
      PERSONEL_POSTGRES_DSN: "postgres://personel:personel@postgres:5432/personel?sslmode=disable"
      PERSONEL_CLICKHOUSE_ADDR: "clickhouse:9000"
      PERSONEL_MINIO_ENDPOINT: "minio:9000"
      PERSONEL_NATS_URL: "nats://nats:4222"
      PERSONEL_VAULT_ADDR: "http://vault:8200"
      # These must be set after vault-init runs:
      PERSONEL_VAULT_APP_ROLE_ID: "${VAULT_ROLE_ID:-}"
      PERSONEL_VAULT_APP_ROLE_SECRET_ID: "${VAULT_SECRET_ID:-}"
      PERSONEL_KEYCLOAK_ISSUER_URL: "http://keycloak:8080/realms/personel"
      PERSONEL_KEYCLOAK_CLIENT_ID: "personel-admin-api"
      PERSONEL_LIVEKIT_HOST: "http://localhost:7880"
      PERSONEL_LIVEKIT_API_KEY: "devkey"
      PERSONEL_LIVEKIT_API_SECRET: "devsecret"
    healthcheck:
      test: ["CMD", "/personel-api", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
