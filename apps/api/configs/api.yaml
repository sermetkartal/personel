# Personel Admin API — default configuration
# Override any value with PERSONEL_<SECTION>_<KEY> environment variables.
# Example: PERSONEL_HTTP_ADDR=":9090"
#
# IMPORTANT: Do NOT commit real credentials here.
# All secrets should be injected via environment variables or systemd credentials.
# The values below are suitable only for local development with docker-compose.

http:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 60s
  idle_timeout: 120s
  shutdown_timeout: 15s
  cors_origins:
    - "http://localhost:3000"   # Next.js admin console (dev)
    - "http://localhost:3001"   # Employee transparency portal (dev)
  # tls_cert: ""
  # tls_key: ""

postgres:
  dsn: "postgres://personel:personel@localhost:5432/personel?sslmode=disable"
  max_conns: 20
  min_conns: 2
  max_conn_lifetime: 1h
  max_conn_idle_time: 30m

clickhouse:
  addr: "localhost:9000"
  database: "personel"
  username: "personel"
  password: "personel"
  tls_enable: false

minio:
  endpoint: "localhost:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_ssl: false
  bucket_screenshots: "screenshots"
  bucket_dsr: "dsr-responses"
  bucket_destruction: "destruction-reports"
  presign_ttl: 60s

nats:
  url: "nats://localhost:4222"
  creds_file: ""
  connect_timeout: 5s
  policy_subject: "policy.v1"
  live_view_subject: "liveview.v1"

vault:
  addr: "http://localhost:8200"
  # app_role_id is required — set via PERSONEL_VAULT_APP_ROLE_ID env var.
  app_role_id: ""
  # app_role_secret_id is required — inject via systemd credential or env var.
  # Never commit to version control.
  app_role_secret_id: ""
  tls_ca_cert: ""
  control_plane_signing_key: "control-plane-signing"
  token_renew_interval: 10m

keycloak:
  # issuer_url must be reachable by the API server at startup (OIDC discovery).
  issuer_url: "http://localhost:8090/realms/personel"
  client_id: "personel-admin-api"

observability:
  metrics_path: "/metrics"
  tracing_enabled: false
  # tracing_endpoint: "localhost:4317"  # OTLP gRPC
  service_name: "personel-admin-api"
  service_version: "0.1.0"

livekit:
  host: "http://localhost:7880"
  api_key: "devkey"
  api_secret: "devsecret"
  # Hard cap: must not exceed 60m (server will reject the config).
  max_session_duration: 15m
  approval_timeout: 10m

tenant:
  # Single-tenant MVP mode: set this to the tenant UUID created at first boot.
  # DSR SLA job and audit verifier will run for this tenant.
  default_tenant_id: ""

rate_limit:
  requests_per_minute: 300
  burst_size: 50
