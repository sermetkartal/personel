# Local development compose file for the gateway and its direct dependencies.
# THIS IS FOR LOCAL DEV ONLY. Production compose is devops-engineer's responsibility.
# See deployments/ in the monorepo root for the production stack.

services:
  nats:
    image: nats:2.10-alpine
    container_name: personel-dev-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"  # monitoring
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: personel-dev-clickhouse
    environment:
      CLICKHOUSE_DB: personel
      CLICKHOUSE_USER: personel_enricher
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: devonly
    ports:
      - "9000:9000"
      - "8123:8123"  # HTTP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  minio:
    image: minio/minio:latest
    container_name: personel-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"  # console
    volumes:
      - minio_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: personel-dev-postgres
    environment:
      POSTGRES_DB: personel
      POSTGRES_USER: personel_gw
      POSTGRES_PASSWORD: devonly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personel_gw -d personel"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Gateway — requires TLS certs to be present at the paths below.
  # For local dev, generate self-signed certs: make dev-certs (not in this file).
  # gateway:
  #   build:
  #     context: ..
  #     dockerfile: Dockerfile
  #   container_name: personel-dev-gateway
  #   command: ["--config", "/etc/personel/gateway.yaml"]
  #   volumes:
  #     - ../configs/gateway.yaml:/etc/personel/gateway.yaml:ro
  #     - ./dev-certs:/etc/personel/tls:ro
  #   ports:
  #     - "9443:9443"
  #     - "9090:9090"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  clickhouse_data:
  minio_data:
  postgres_data:
