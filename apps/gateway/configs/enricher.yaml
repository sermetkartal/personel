# enricher.yaml — example configuration for the Personel Event Enricher.
# Override with PERSONEL_ENRICHER_<SECTION>_<KEY> environment variables.

nats:
  urls:
    - "nats://nats:4222"
  connect_timeout: "10s"
  max_reconnect: -1
  publish_timeout: "5s"

clickhouse:
  addrs:
    - "clickhouse:9000"
  database: "personel"
  username: "personel_enricher"
  password: "enricher123"
  # async_insert: false means the enricher waits for ClickHouse to confirm each batch.
  # Set to true when ingest rate exceeds ~500k events/sec to enable the async insert buffer.
  async_insert: false

minio:
  endpoint: "minio:9000"
  access_key: "minioadmin"                     # injected via env
  secret_key: "207a49fe34f3e61edb4198bfc620d12f"                     # injected via env
  use_ssl: false
  region: "us-east-1"

postgres:
  dsn: "postgres://personel_enricher:enricher123@postgres:5432/personel?sslmode=disable"
  max_conns: 10
  min_conns: 1
  conn_timeout: "10s"
  query_timeout: "5s"

observability:
  otlp_endpoint: "otelcollector.internal:4317"
  prometheus_addr: "0.0.0.0:9091"
  log_level: "info"
  service_name: "personel-enricher"

batch:
  max_size: 10000          # rows per ClickHouse insert batch
  flush_interval: "2s"     # max time before incomplete batch is sent

# Optional MaxMind GeoLite2 server-side GeoIP enrichment. When
# mmdb_path is empty the enricher skips geo lookups entirely and
# logs "geoip lookup disabled" at boot. When set, the enricher
# opens the file once and attaches geo_country_code + geo_city_name
# to the PayloadJSON of every network.* event whose payload contains
# a public IP in remote_ip / source_ip / dest_ip / answer_ip.
#
# The mmdb file is installed (and refreshed weekly) by the systemd
# unit personel-maxmind-download.timer. Operator setup runbook:
# docs/operations/maxmind-setup.md
#
# Override via env:
#   PERSONEL_ENRICHER_GEOIP__MMDB_PATH=/var/lib/personel/geolite2/GeoLite2-City.mmdb
geoip:
  mmdb_path: ""
