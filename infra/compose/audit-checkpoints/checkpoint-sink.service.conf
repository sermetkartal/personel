# =============================================================================
# Personel — Audit Checkpoint Sink Configuration
# Controls how audit chain checkpoints are written to append-only storage.
# Per admin-audit-immutability.md §4 (referenced but not yet authored).
# =============================================================================

# Checkpoint interval: write a signed checkpoint every N audit events
# or at CHECKPOINT_INTERVAL seconds, whichever comes first.
CHECKPOINT_INTERVAL_SECONDS=3600
CHECKPOINT_EVENT_BATCH=1000

# Signing: checkpoints are signed with the control-plane signing key (Vault transit)
# The signature covers: tenant_id || last_seq || last_hash || checkpoint_at
CHECKPOINT_SIGNING_KEY_PATH=transit/keys/project/control-signing

# Storage: primary storage is the audit.checkpoints table in Postgres.
# Secondary (offhost): ship to an append-only S3-compatible endpoint.
# Set CHECKPOINT_OFFHOST_ENDPOINT to enable offhost checkpointing.
CHECKPOINT_OFFHOST_ENDPOINT=
CHECKPOINT_OFFHOST_BUCKET=audit-checkpoints
CHECKPOINT_OFFHOST_PREFIX=checkpoints/

# Vault address for signing operations
VAULT_ADDR=https://vault.personel.internal:8200
