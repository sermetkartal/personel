# =============================================================================
# Personel Platform — OpenSearch 2-node Cluster (Node 2 / vm5 secondary)
# =============================================================================
# Faz 5 Madde 51 — OpenSearch 2-node cluster
#
# This config is deployed on vm5 (192.168.5.32). It is IDENTICAL to
# opensearch.cluster-node1.yml except for node.name, network.publish_host,
# and the TLS cert file names.
# =============================================================================

cluster.name: personel-opensearch-cluster
node.name: opensearch-02
node.roles: [master, data, ingest]

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
network.host: 0.0.0.0
network.publish_host: 192.168.5.32
http.port: 9200
transport.port: 9300

# ---------------------------------------------------------------------------
# Discovery — Zen2, both nodes seed each other
# ---------------------------------------------------------------------------
discovery.seed_hosts:
  - 192.168.5.44:9300
  - 192.168.5.32:9300
cluster.initial_master_nodes:
  - opensearch-01
  - opensearch-02

# ---------------------------------------------------------------------------
# Data paths
# ---------------------------------------------------------------------------
path.data: /usr/share/opensearch/data
path.logs: /usr/share/opensearch/logs

bootstrap.memory_lock: true

# ---------------------------------------------------------------------------
# TLS / Security — node-specific cert issued from Vault PKI server-cert role
# ---------------------------------------------------------------------------
plugins.security.disabled: false

plugins.security.ssl.transport.enabled: true
plugins.security.ssl.transport.pemcert_filepath: /etc/personel/tls/opensearch-02.crt
plugins.security.ssl.transport.pemkey_filepath: /etc/personel/tls/opensearch-02.key
plugins.security.ssl.transport.pemtrustedcas_filepath: /etc/personel/tls/tenant_ca.crt
plugins.security.ssl.transport.enforce_hostname_verification: false
plugins.security.ssl.transport.resolve_hostname: false

plugins.security.ssl.http.enabled: true
plugins.security.ssl.http.pemcert_filepath: /etc/personel/tls/opensearch-02.crt
plugins.security.ssl.http.pemkey_filepath: /etc/personel/tls/opensearch-02.key
plugins.security.ssl.http.pemtrustedcas_filepath: /etc/personel/tls/tenant_ca.crt

plugins.security.nodes_dn:
  - "CN=opensearch-01*"
  - "CN=opensearch-02*"
plugins.security.authcz.admin_dn:
  - "CN=admin*"

plugins.security.allow_default_init_securityindex: true
plugins.security.audit.type: internal_opensearch
plugins.security.enable_snapshot_restore_privilege: true
plugins.security.check_snapshot_restore_write_privileges: true
plugins.security.restapi.roles_enabled: ["all_access", "security_rest_api_access"]
plugins.security.allow_unsafe_democertificates: false

# ---------------------------------------------------------------------------
# Performance / shard layout
# ---------------------------------------------------------------------------
thread_pool.write.queue_size: 1000
thread_pool.search.queue_size: 1000

cluster.routing.allocation.disk.threshold_enabled: true
cluster.routing.allocation.disk.watermark.low: "85%"
cluster.routing.allocation.disk.watermark.high: "90%"
cluster.routing.allocation.disk.watermark.flood_stage: "95%"

index.number_of_replicas: 1
index.number_of_shards: 2
