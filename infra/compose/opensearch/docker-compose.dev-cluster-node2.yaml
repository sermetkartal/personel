# =============================================================================
# Personel Platform — OpenSearch Cluster Node 2 (DEV mode, vm5)
# =============================================================================
# Faz 5 Madde 51 — OpenSearch 2-node cluster, PHASE 1 DEV VARIANT
#
# Standalone compose on vm5. Deploy via:
#   cd /opt/personel/opensearch && docker compose -f docker-compose.dev-cluster-node2.yaml up -d
# =============================================================================

volumes:
  opensearch-02-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/personel/opensearch-02/data

networks:
  opensearch-cluster:
    driver: bridge

services:
  opensearch-02:
    image: opensearchproject/opensearch:2.13.0
    container_name: personel-opensearch-02
    hostname: opensearch-02
    restart: unless-stopped
    ports:
      - "0.0.0.0:9200:9200"
      - "0.0.0.0:9300:9300"
    volumes:
      - opensearch-02-data:/usr/share/opensearch/data
      - ./opensearch.dev-cluster-node2.yml:/usr/share/opensearch/config/opensearch.yml:ro
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
    networks:
      - opensearch-cluster
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf 'http://127.0.0.1:9200/_cluster/health' | grep -E '\"status\":\"(green|yellow)\"'"
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: opensearch-02
      com.personel.tier: data
      com.personel.cluster-role: opensearch-master-data
