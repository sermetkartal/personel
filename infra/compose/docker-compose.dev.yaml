name: personel

# =============================================================================
# Dev/smoke-test override.
#
# Brings up the minimum viable slice without the full production ceremony
# (no TLS bootstrap, no Shamir unseal, no realm import). Use:
#
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d postgres
#
# This override exists so developers can validate the stack incrementally
# on macOS / Linux without needing to run infra/install.sh first.
# NEVER use this file in production — it disables every security control.
# =============================================================================

volumes:
  # Override every production-bound volume back to plain Docker-managed
  # local volumes. The base file binds these to host paths under
  # /var/lib/personel/... which only exist on a real deployment host
  # after infra/install.sh has provisioned them.
  postgres-data:
    driver: local
    driver_opts: !reset null
  clickhouse-data:
    driver: local
    driver_opts: !reset null
  minio-data:
    driver: local
    driver_opts: !reset null
  nats-data:
    driver: local
    driver_opts: !reset null
  vault-data:
    driver: local
    driver_opts: !reset null
  opensearch-data:
    driver: local
    driver_opts: !reset null
  keycloak-data:
    driver: local
    driver_opts: !reset null
  prometheus-data:
    driver: local
    driver_opts: !reset null
  grafana-data:
    driver: local
    driver_opts: !reset null
  tls-certs:
    driver: local
    driver_opts: !reset null
  audit-log:
    driver: local
    driver_opts: !reset null
  ml-models:
    driver: local
    driver_opts: !reset null

services:

  # ---------------------------------------------------------------------------
  # Postgres — boot without waiting for Vault, without the TLS volume mount.
  # ---------------------------------------------------------------------------
  postgres:
    depends_on: !reset []
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh:ro
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_PASSWORD: dev-postgres-do-not-use-in-prod

  # ---------------------------------------------------------------------------
  # Vault — dev mode (in-memory, no Shamir, root token = dev-root-token).
  # Health check on /v1/sys/health with ?standbyok=true.
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.15
    entrypoint:
      - vault
      - server
      - -dev
      - -dev-root-token-id=dev-root-token
      - -dev-listen-address=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    depends_on: !reset []
    volumes: !reset []
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO — single-node dev mode, no Object Lock (bucket created by init).
  # ---------------------------------------------------------------------------
  minio:
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin-dev-only

  minio-init: !reset null
  minio-worm-init: !reset null

  # ---------------------------------------------------------------------------
  # NATS — dev JetStream config, no encryption / TLS / operator JWT.
  # The production nats.conf substitutes $NATS_STORE_ENCRYPTION_KEY and
  # imports an NSC-generated operator JWT; neither exist in dev.
  # ---------------------------------------------------------------------------
  nats:
    volumes:
      - nats-data:/data/jetstream
      - ./nats/nats.dev.conf:/etc/nats/nats.conf:ro

  # ---------------------------------------------------------------------------
  # API — dev config. Postgres sslmode=disable, vault http, minio http,
  # opensearch left as an invalid URL (not started in dev; API config
  # loader tolerates unreachable search backends as long as startup
  # doesn't probe them).
  # ---------------------------------------------------------------------------
  api:
    ports: !override
      # Port 8000 is used by Docker Desktop internals on macOS — move
      # the dev API to 8001 to avoid "port already allocated".
      - "127.0.0.1:8001:8000"
    depends_on: !reset
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes: !override
      - ./api/api.dev.yaml:/configs/api.yaml:ro
    environment:
      PERSONEL_CONFIG_PATH: /configs/api.yaml
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID: dev-role-id-not-used
      POSTGRES_DSN: "host=postgres port=5432 dbname=personel user=postgres password=dev-postgres-do-not-use-in-prod sslmode=disable"
      CLICKHOUSE_DSN: "tcp://clickhouse:9000?database=personel&username=default&secure=false"
      NATS_URL: nats://nats:4222
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: personel
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin-dev-only
      MINIO_AUDIT_SINK_ACCESS_KEY: minioadmin
      MINIO_AUDIT_SINK_SECRET_KEY: minioadmin-dev-only
      TENANT_ID: 00000000-0000-0000-0000-000000000001
      JWT_ISSUER: http://keycloak:8080/realms/personel
      DPO_EMAIL: dpo@example.com
      DPO_SECONDARY_EMAIL: dpo2@example.com
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: dev

  # ---------------------------------------------------------------------------
  # ClickHouse — use stock image config (no custom mount). The production
  # clickhouse/config.xml references TLS certs and a user_directories
  # structure that stock 24.3 expects but our custom XML doesn't define
  # (Error: "Not found: user_directories.users_xml.path"). For smoke
  # testing we let the stock image bring its own defaults. Volumes list
  # is overridden explicitly — docker compose doesn't deep-merge list
  # overrides, it replaces them, which is what we want here.
  # ---------------------------------------------------------------------------
  clickhouse:
    depends_on: !reset []
    volumes: !override
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: personel
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"

  # ---------------------------------------------------------------------------
  # Keycloak — dev-file H2 backend so we don't need a separate
  # personel_keycloak Postgres database. Removes --optimized so Keycloak
  # rebuilds for the dev-file storage at start time. For real
  # deployments the production compose wires Keycloak to Postgres; this
  # override is dev-only and loses realm state on container restart.
  # ---------------------------------------------------------------------------
  keycloak:
    # start-dev performs a fresh Quarkus build at startup (not --optimized)
    # so the postgres JDBC driver is selected correctly based on KC_DB.
    # We removed --import-realm to simplify the first smoke test; once
    # postgres bring-up is green, re-add it with the dev realm JSON.
    command: ["start-dev"]
    depends_on:
      postgres:
        condition: service_healthy
    # Disable healthcheck in dev — the stock Keycloak image is
    # distroless and lacks curl/wget, so the base compose file's
    # `curl -f http://localhost:8080/health/ready` always fails even
    # though the endpoint itself returns 200. In dev we verify health
    # from the host side instead. For prod, a sidecar init container
    # or a different base image is the right long-term fix.
    healthcheck:
      disable: true
    volumes:
      - keycloak-data:/opt/keycloak/data
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/personel_keycloak"
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: dev-postgres-do-not-use-in-prod
      # KC_BOOTSTRAP_ADMIN_* only applies to the `bootstrap-admin` sub-
      # command in Keycloak 24+, NOT to `start-dev`. For start-dev we
      # need the legacy KEYCLOAK_ADMIN / KEYCLOAK_ADMIN_PASSWORD envs
      # which create the admin on first boot if no master-realm user
      # exists. Caught 2026-04-11 after an empty user_entity table.
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin-dev-only
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin-dev-only
      # Base file sets KC_HOSTNAME=personel.example.com which Keycloak
      # embeds in its OIDC discovery document as the issuer. The API
      # then compares the discovered issuer to its configured
      # issuer_url (http://keycloak:8080/realms/personel) and fails
      # because they don't match. Force the in-network name here.
      # Keycloak 24 rejects "both hostname and hostname-url" — use just
      # hostname-url to pin the issuer to the in-network name.
      KC_HOSTNAME: ""
      KC_HOSTNAME_URL: "http://keycloak:8080"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
