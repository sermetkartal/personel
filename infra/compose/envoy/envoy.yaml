# =============================================================================
# Personel Platform — Envoy Edge Proxy (Basic Phase 1 Configuration)
# TLS termination, routing to console, portal, API, Grafana.
# The gateway gRPC port is NOT proxied here — agents connect directly.
# =============================================================================

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:

    # HTTP → HTTPS redirect
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  virtual_hosts:
                    - name: redirect
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          redirect:
                            https_redirect: true

    # HTTPS listener
    - name: listener_https
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/personel/tls/envoy.crt
                    private_key:
                      filename: /etc/personel/tls/envoy.key
                validation_context:
                  trusted_ca:
                    filename: /etc/personel/tls/tenant_ca.crt
              require_client_certificate: false
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                use_remote_address: true
                xff_num_trusted_hops: 1
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  virtual_hosts:
                    - name: personel
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/console" }
                          route:
                            cluster: console
                            timeout: 30s
                        - match: { prefix: "/portal" }
                          route:
                            cluster: portal
                            timeout: 30s
                        - match: { prefix: "/api" }
                          route:
                            cluster: api
                            timeout: 60s
                            prefix_rewrite: "/"
                        - match: { prefix: "/grafana" }
                          route:
                            cluster: grafana
                            timeout: 30s
                        - match: { prefix: "/auth" }
                          route:
                            cluster: keycloak
                            timeout: 30s
                        - match: { prefix: "/" }
                          redirect:
                            path_redirect: "/console"

  clusters:
    - name: console
      connect_timeout: 5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: console
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: console
                      port_value: 3000

    - name: portal
      connect_timeout: 5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: portal
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: portal
                      port_value: 3001

    - name: api
      connect_timeout: 5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api
                      port_value: 8000

    - name: keycloak
      connect_timeout: 5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: keycloak
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: keycloak
                      port_value: 8080

    - name: grafana
      connect_timeout: 5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: grafana
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: grafana
                      port_value: 3000
