name: personel

# =============================================================================
# Personel Platform — Production Docker Compose
# =============================================================================
# TR: Bu dosyayı doğrudan düzenlemeyin. Müşteriye özgü ayarlar için
#     docker-compose.override.yaml kullanın.
# EN: Do not edit this file directly. Use docker-compose.override.yaml
#     for customer-specific overrides.
#
# Resource budget (16c / 64GB host, 20% headroom):
#   Total CPU:  ~31 cores assigned (limit), 12 cores reserved headroom
#   Total RAM:  ~51 GB assigned limit, 13 GB headroom
#
# Network layout:
#   public       — envoy <-> console, portal
#   app          — envoy, api, gateway, enricher, keycloak, console, portal
#   data         — api, gateway, enricher, postgres, clickhouse, nats, minio,
#                  opensearch
#   vault-net    — vault + services that need Vault (api, gateway, keycloak)
#   dlp-isolated — dlp + nats (consumer), postgres (ro), minio (ro), vault
#   monitoring   — prometheus + all services exposing /metrics
# =============================================================================

networks:
  public:
    driver: bridge
  app:
    driver: bridge
    internal: false
  data:
    driver: bridge
    internal: true
  vault-net:
    driver: bridge
    internal: true
  dlp-isolated:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
  monitoring:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_DIR:-/var/lib/personel/postgres/data}
  clickhouse-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CLICKHOUSE_DATA_DIR:-/var/lib/personel/clickhouse/data}
  nats-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/personel/nats/data
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MINIO_DATA_DIR:-/var/lib/personel/minio/data}
  opensearch-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENSEARCH_DATA_DIR:-/var/lib/personel/opensearch/data}
  vault-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VAULT_DATA_DIR:-/var/lib/personel/vault/data}
  keycloak-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${KEYCLOAK_DATA_DIR:-/var/lib/personel/keycloak/data}
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROMETHEUS_DATA_DIR:-/var/lib/personel/prometheus/data}
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${GRAFANA_DATA_DIR:-/var/lib/personel/grafana/data}
  tls-certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${TLS_DIR:-/etc/personel/tls}
  audit-log:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AUDIT_LOG_DIR:-/var/log/personel/audit}

services:

  # ===========================================================================
  # VAULT — Secrets, PKI, Key Hierarchy
  # Must start first; all services depend on it.
  # ===========================================================================
  vault:
    image: hashicorp/vault:1.15.6
    container_name: personel-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    user: "100:1000"
    ports:
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    volumes:
      - vault-data:/vault/data
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - tls-certs:/vault/tls:ro
    command: ["vault", "server", "-config=/vault/config/config.hcl"]
    environment:
      VAULT_ADDR: "https://127.0.0.1:8200"
      VAULT_LOG_LEVEL: ${VAULT_LOG_LEVEL:-info}
    networks:
      - vault-net
      - monitoring
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status -address=https://127.0.0.1:8200 -tls-skip-verify 2>&1 | grep -E 'Initialized|Sealed'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${VAULT_CPUS:-1}"
          memory: "${VAULT_MEM:-1g}"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: vault
      com.personel.tier: security

  # ===========================================================================
  # POSTGRES — Metadata Store
  # ===========================================================================
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: personel/postgres:16
    container_name: personel-postgres
    restart: unless-stopped
    user: postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - tls-certs:/etc/personel/tls:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=tr_TR.UTF-8"
    networks:
      - data
      - vault-net
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personel}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPUS:-4}"
          memory: "${POSTGRES_MEM:-8g}"
        reservations:
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: postgres
      com.personel.tier: data

  # ===========================================================================
  # CLICKHOUSE — Time-Series Event Store
  # Phase 1: single node, MergeTree engine.
  # Phase-1-exit: macros.xml primes the migration to ReplicatedMergeTree.
  # ===========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: personel-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./clickhouse/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - tls-certs:/etc/personel/tls:ro
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-personel}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-personel_app}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    networks:
      - data
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:8123/ping' | grep -q 'Ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${CLICKHOUSE_CPUS:-4}"
          memory: "${CLICKHOUSE_MEM:-16g}"
        reservations:
          memory: 4g
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: clickhouse
      com.personel.tier: data

  # ===========================================================================
  # NATS JetStream — Event Bus
  # JetStream enabled, TLS, at-rest encryption.
  # ===========================================================================
  nats:
    image: nats:2.10-alpine
    container_name: personel-nats
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data/jetstream
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - tls-certs:/etc/personel/tls:ro
    command: ["-c", "/etc/nats/nats.conf"]
    networks:
      - data
      - dlp-isolated
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${NATS_CPUS:-2}"
          memory: "${NATS_MEM:-4g}"
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: nats
      com.personel.tier: data

  # ===========================================================================
  # MINIO — Object Store (Screenshots, Keystroke Blobs, Backups)
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: personel-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
      - tls-certs:/etc/personel/tls:ro
    command: server /data --console-address ":9001" --certs-dir /etc/personel/tls
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_VOLUMES: /data
      MINIO_OPTS: "--quiet"
    networks:
      - data
      - dlp-isolated
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -f http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${MINIO_CPUS:-2}"
          memory: "${MINIO_MEM:-4g}"
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: minio
      com.personel.tier: data

  # MinIO bucket initialization (runs once, exits)
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    container_name: personel-minio-init
    restart: "no"
    volumes:
      - ./minio/buckets.sh:/buckets.sh:ro
      - ./minio/lifecycle.json:/lifecycle.json:ro
    entrypoint: ["/bin/sh", "/buckets.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - data
    depends_on:
      minio:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # OPENSEARCH — Full-Text Search and Audit Search
  # ===========================================================================
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: personel-opensearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
      - tls-certs:/etc/personel/tls:ro
    environment:
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms2g -Xmx2g}
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      bootstrap.memory_lock: "true"
    networks:
      - data
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sku admin:${OPENSEARCH_ADMIN_PASSWORD} 'https://localhost:9200/_cluster/health' | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "${OPENSEARCH_CPUS:-2}"
          memory: "${OPENSEARCH_MEM:-4g}"
        reservations:
          memory: 2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: opensearch
      com.personel.tier: data

  # ===========================================================================
  # KEYCLOAK — Identity and Access Management
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: personel-keycloak
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/realm-personel.json:/opt/keycloak/data/import/realm-personel.json:ro
      - tls-certs:/etc/personel/tls:ro
    command: ["start", "--import-realm", "--optimized"]
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KEYCLOAK_DB_URL:-jdbc:postgresql://postgres:5432/personel_keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-app_keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${PERSONEL_EXTERNAL_HOST}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_EXTRA_ARGS: "--log-level=INFO"
    networks:
      - app
      - data
      - vault-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${KEYCLOAK_CPUS:-2}"
          memory: "${KEYCLOAK_MEM:-2g}"
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: keycloak
      com.personel.tier: app

  # ===========================================================================
  # INGEST GATEWAY — Agent mTLS Endpoint
  # ===========================================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      args:
        PERSONEL_VERSION: ${PERSONEL_VERSION:-0.1.0}
    image: personel/gateway:${PERSONEL_VERSION:-0.1.0}
    container_name: personel-gateway
    restart: unless-stopped
    ports:
      - "0.0.0.0:${GATEWAY_GRPC_PORT:-9443}:9443"
    volumes:
      - tls-certs:/etc/personel/tls:ro
      - audit-log:/var/log/personel/audit:rw
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-https://vault.personel.internal:8200}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID_GATEWAY}
      NATS_URL: nats://nats:4222
      POSTGRES_DSN: "host=postgres port=5432 dbname=${POSTGRES_DB:-personel} user=${POSTGRES_GATEWAY_USER:-app_gateway} sslmode=verify-full sslrootcert=/etc/personel/tls/tenant_ca.crt"
      GATEWAY_GRPC_PORT: ${GATEWAY_GRPC_PORT:-9443}
      GATEWAY_TLS_CERT: ${GATEWAY_TLS_CERT:-/etc/personel/tls/gateway.crt}
      GATEWAY_TLS_KEY: ${GATEWAY_TLS_KEY:-/etc/personel/tls/gateway.key}
      GATEWAY_CA_BUNDLE: ${GATEWAY_CA_BUNDLE:-/etc/personel/tls/tenant_ca.crt}
      TENANT_ID: ${PERSONEL_TENANT_ID}
      LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-info}
      METRICS_PORT: ${GATEWAY_METRICS_PORT:-9090}
    networks:
      - app
      - data
      - vault-net
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/personel-gateway", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${GATEWAY_CPUS:-2}"
          memory: "${GATEWAY_MEM:-2g}"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: gateway
      com.personel.tier: edge

  # ===========================================================================
  # ADMIN API — REST/gRPC Management API
  # ===========================================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        PERSONEL_VERSION: ${PERSONEL_VERSION:-0.1.0}
    image: personel/api:${PERSONEL_VERSION:-0.1.0}
    container_name: personel-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_HTTP_PORT:-8000}:8000"
    volumes:
      - tls-certs:/etc/personel/tls:ro
      - audit-log:/var/log/personel/audit:rw
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-https://vault.personel.internal:8200}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID_API}
      POSTGRES_DSN: "host=postgres port=5432 dbname=${POSTGRES_DB:-personel} user=${POSTGRES_APP_USER:-app_admin_api} sslmode=verify-full sslrootcert=/etc/personel/tls/tenant_ca.crt"
      CLICKHOUSE_DSN: "tcp://clickhouse:9000?database=${CLICKHOUSE_DB:-personel}&username=${CLICKHOUSE_USER:-personel_app}&password=${CLICKHOUSE_PASSWORD}&secure=false"
      OPENSEARCH_URL: "https://opensearch:9200"
      OPENSEARCH_USER: ${OPENSEARCH_ADMIN_USER:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      NATS_URL: nats://nats:4222
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-personel}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_GATEWAY_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_GATEWAY_SECRET_KEY}
      TENANT_ID: ${PERSONEL_TENANT_ID}
      API_HTTP_PORT: ${API_HTTP_PORT:-8000}
      JWT_ISSUER: ${API_JWT_ISSUER}
      JWT_KID: ${API_JWT_KID:-personel-api-v1}
      DSR_SLA_WARN_DAYS: ${DSR_SLA_WARN_DAYS:-20}
      DSR_SLA_OVERDUE_DAYS: ${DSR_SLA_OVERDUE_DAYS:-30}
      DPO_EMAIL: ${DPO_EMAIL}
      DPO_SECONDARY_EMAIL: ${DPO_SECONDARY_EMAIL}
      LOG_LEVEL: ${API_LOG_LEVEL:-info}
      METRICS_PORT: ${API_METRICS_PORT:-9091}
    networks:
      - app
      - data
      - vault-net
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/personel-api", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-2}"
          memory: "${API_MEM:-2g}"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: api
      com.personel.tier: app

  # ===========================================================================
  # EVENT ENRICHER — ClickHouse Writer, OpenSearch Indexer, Audit Appender
  # Subscribes to NATS, writes to storage backends.
  # ===========================================================================
  enricher:
    build:
      context: ./enricher
      dockerfile: Dockerfile
      args:
        PERSONEL_VERSION: ${PERSONEL_VERSION:-0.1.0}
    image: personel/enricher:${PERSONEL_VERSION:-0.1.0}
    container_name: personel-enricher
    restart: unless-stopped
    volumes:
      - tls-certs:/etc/personel/tls:ro
      - audit-log:/var/log/personel/audit:rw
    environment:
      NATS_URL: nats://nats:4222
      CLICKHOUSE_DSN: "tcp://clickhouse:9000?database=${CLICKHOUSE_DB:-personel}&username=${CLICKHOUSE_USER:-personel_app}&password=${CLICKHOUSE_PASSWORD}"
      OPENSEARCH_URL: "https://opensearch:9200"
      OPENSEARCH_USER: ${OPENSEARCH_ADMIN_USER:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      POSTGRES_DSN: "host=postgres port=5432 dbname=${POSTGRES_DB:-personel} user=${POSTGRES_APP_USER:-app_admin_api} sslmode=verify-full sslrootcert=/etc/personel/tls/tenant_ca.crt"
      TENANT_ID: ${PERSONEL_TENANT_ID}
      LOG_LEVEL: ${API_LOG_LEVEL:-info}
      METRICS_PORT: "9093"
    networks:
      - data
      - monitoring
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/personel-enricher", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${ENRICHER_CPUS:-1}"
          memory: "${ENRICHER_MEM:-1g}"
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: enricher
      com.personel.tier: app

  # ===========================================================================
  # DLP SERVICE — Keystroke Decryption and Pattern Matching
  # ISOLATED: distroless, read-only, cap-drop all, seccomp+AppArmor, dlp-isolated net only.
  # Profile 1 (Hardened Container) per dlp-deployment-profiles.md
  # ===========================================================================
  dlp:
    build:
      context: ./dlp
      dockerfile: Dockerfile
      args:
        PERSONEL_VERSION: ${PERSONEL_VERSION:-0.1.0}
    image: personel/dlp:${PERSONEL_VERSION:-0.1.0}
    container_name: personel-dlp
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/dlp:rw,mode=0700,size=64m,noexec,nosuid,nodev
      - /tmp:rw,mode=0700,size=16m,noexec,nosuid,nodev
    user: "65532:65532"
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true
      - seccomp=/etc/personel/dlp/seccomp.json
      - apparmor=personel-dlp
    volumes:
      - tls-certs:/etc/personel/tls:ro
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-https://vault.personel.internal:8200}
      VAULT_ROLE_ID: ${DLP_VAULT_ROLE_ID}
      NATS_URL: nats://nats:4222
      POSTGRES_DSN: "host=postgres port=5432 dbname=${POSTGRES_DB:-personel} user=${POSTGRES_DLP_RO_USER:-app_dlp_ro} sslmode=verify-full sslrootcert=/etc/personel/tls/tenant_ca.crt"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_DLP_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_DLP_SECRET_KEY}
      TENANT_ID: ${PERSONEL_TENANT_ID}
      DLP_WORKER_COUNT: ${DLP_WORKER_COUNT:-4}
      DLP_BATCH_SIZE: ${DLP_BATCH_SIZE:-50}
      GODEBUG: ${DLP_GODEBUG:-madvdontneed=1}
      LOG_LEVEL: ${DLP_LOG_LEVEL:-info}
      METRICS_PORT: ${DLP_METRICS_PORT:-9092}
    networks:
      - dlp-isolated
      - monitoring
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/dlp", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ulimits:
      core:
        soft: 0
        hard: 0
    deploy:
      resources:
        limits:
          cpus: "${DLP_CPUS:-2}"
          memory: "${DLP_MEM:-2g}"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: dlp
      com.personel.tier: security
      com.personel.isolation: profile-1-hardened-container

  # ===========================================================================
  # ADMIN CONSOLE — Next.js Web UI
  # ===========================================================================
  console:
    build:
      context: ./console
      dockerfile: Dockerfile
      args:
        PERSONEL_VERSION: ${PERSONEL_VERSION:-0.1.0}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_TENANT_ID: ${PERSONEL_TENANT_ID}
    image: personel/console:${PERSONEL_VERSION:-0.1.0}
    container_name: personel-console
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-personel}
      KEYCLOAK_CLIENT_ID: console
      NODE_ENV: production
    networks:
      - app
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${CONSOLE_CPUS:-1}"
          memory: "${CONSOLE_MEM:-1g}"
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: console
      com.personel.tier: ui

  # ===========================================================================
  # TRANSPARENCY PORTAL — Employee-Facing Next.js UI
  # ===========================================================================
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        PERSONEL_VERSION: ${PERSONEL_VERSION:-0.1.0}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_TENANT_ID: ${PERSONEL_TENANT_ID}
    image: personel/portal:${PERSONEL_VERSION:-0.1.0}
    container_name: personel-portal
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-personel}
      KEYCLOAK_CLIENT_ID: portal
      NODE_ENV: production
    networks:
      - app
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${PORTAL_CPUS:-1}"
          memory: "${PORTAL_MEM:-512m}"
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: portal
      com.personel.tier: ui

  # ===========================================================================
  # LIVEKIT SFU — WebRTC Screen Share
  # ===========================================================================
  livekit:
    image: livekit/livekit-server:v1.6.0
    container_name: personel-livekit
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LIVEKIT_PORT:-7880}:7880"
      - "0.0.0.0:${LIVEKIT_RTC_UDP_PORT_MIN:-50000}-${LIVEKIT_RTC_UDP_PORT_MAX:-60000}:50000-60000/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_BIND: "0.0.0.0:7880"
    networks:
      - app
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880/healthz | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2g"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: livekit
      com.personel.tier: edge

  # ===========================================================================
  # ENVOY EDGE PROXY — TLS Termination, Routing
  # The ONLY service binding to the LAN interface on port 443/80.
  # ===========================================================================
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: personel-envoy
    restart: unless-stopped
    ports:
      - "0.0.0.0:${ENVOY_HTTP_PORT:-80}:10080"
      - "0.0.0.0:${ENVOY_HTTPS_PORT:-443}:10443"
      - "127.0.0.1:${ENVOY_ADMIN_PORT:-9901}:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - tls-certs:/etc/personel/tls:ro
    networks:
      - public
      - app
      - monitoring
    depends_on:
      console:
        condition: service_healthy
      portal:
        condition: service_healthy
      api:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9901/ready | grep -q 'LIVE'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${ENVOY_CPUS:-1}"
          memory: "${ENVOY_MEM:-512m}"
        reservations:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: envoy
      com.personel.tier: edge

  # ===========================================================================
  # PROMETHEUS — Metrics Collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: personel-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
      - "--web.listen-address=0.0.0.0:9090"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q 'Healthy'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${PROMETHEUS_CPUS:-1}"
          memory: "${PROMETHEUS_MEM:-2g}"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: prometheus
      com.personel.tier: observability

  # ===========================================================================
  # GRAFANA — Dashboards and Alerting UI
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: personel-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://keycloak:8080/realms/personel/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8080/realms/personel/protocol/openid-connect/token
      GF_INSTALL_PLUGINS: ""
    networks:
      - monitoring
      - app
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${GRAFANA_CPUS:-1}"
          memory: "${GRAFANA_MEM:-512m}"
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.personel.service: grafana
      com.personel.tier: observability
