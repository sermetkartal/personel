# =============================================================================
# Personel Platform — pg_hba.conf
# Only application service roles from Docker internal networks.
# No trust auth. All connections require password (scram-sha-256) + TLS.
# =============================================================================

# TYPE    DATABASE          USER             ADDRESS                 METHOD

# Local superuser (socket — for init scripts only)
local   all               postgres                                   peer
local   all               all                                        reject

# Docker internal network — all app roles must use scram-sha-256 over TLS
hostssl personel          app_admin_api    172.16.0.0/12             scram-sha-256
hostssl personel          app_gateway      172.16.0.0/12             scram-sha-256
hostssl personel          app_dlp_ro       172.16.0.0/12             scram-sha-256
hostssl personel          app_keycloak     172.16.0.0/12             scram-sha-256
hostssl personel_keycloak app_keycloak     172.16.0.0/12             scram-sha-256

# Replication for pg_basebackup (backup operator from localhost only)
hostssl replication       backup_operator  127.0.0.1/32              scram-sha-256
hostssl replication       backup_operator  172.16.0.0/12             scram-sha-256

# Superuser from localhost only (admin scripts on the host)
hostssl all               postgres         127.0.0.1/32              scram-sha-256

# Reject everything else
host    all               all              all                        reject
