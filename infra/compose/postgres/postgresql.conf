# =============================================================================
# Personel Platform — PostgreSQL Configuration
# Sized for 16c/64GB host; Postgres gets 4 CPU / 8 GB
# =============================================================================

# -----------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
# -----------------------------------------------------------------------------
listen_addresses          = '*'        # Docker network; pg_hba.conf restricts clients
port                      = 5432
max_connections           = 200
superuser_reserved_connections = 5

# -----------------------------------------------------------------------------
# TLS
# TR: Sunucu sertifikaları Vault-agent tarafından yenilenir.
# EN: Server certs renewed by vault-agent.
# -----------------------------------------------------------------------------
ssl                       = on
ssl_cert_file             = '/etc/personel/tls/postgres.crt'
ssl_key_file              = '/etc/personel/tls/postgres.key'
ssl_ca_file               = '/etc/personel/tls/tenant_ca.crt'
ssl_min_protocol_version  = 'TLSv1.3'
ssl_ciphers               = 'HIGH:!aNULL:!MD5'

# -----------------------------------------------------------------------------
# MEMORY
# Total budget ~8GB; leave ~1.5GB for OS/connections
# -----------------------------------------------------------------------------
shared_buffers            = 2GB
effective_cache_size      = 6GB
work_mem                  = 64MB            # per sort/hash op; watch for parallel queries
maintenance_work_mem      = 512MB
wal_buffers               = 64MB
huge_pages                = try

# -----------------------------------------------------------------------------
# WRITE-AHEAD LOG
# -----------------------------------------------------------------------------
wal_level                 = replica         # needed for pg_basebackup
archive_mode              = off             # on if pitr is needed; Phase 2
max_wal_size              = 4GB
min_wal_size              = 512MB
wal_compression           = on
checkpoint_completion_target = 0.9
checkpoint_timeout        = 10min

# -----------------------------------------------------------------------------
# QUERY TUNING
# -----------------------------------------------------------------------------
random_page_cost          = 1.1            # NVMe SSD
effective_io_concurrency  = 200
max_parallel_workers_per_gather = 2
max_parallel_workers      = 4
parallel_leader_participation = on
default_statistics_target = 200

# -----------------------------------------------------------------------------
# AUTOVACUUM (tuned for high-insert workload)
# -----------------------------------------------------------------------------
autovacuum                = on
autovacuum_max_workers    = 4
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_scale_factor = 0.01
autovacuum_analyze_scale_factor = 0.005
autovacuum_vacuum_insert_threshold = 500

# -----------------------------------------------------------------------------
# LOGGING
# Logs go to stderr → captured by Docker json-file driver
# -----------------------------------------------------------------------------
logging_collector         = off
log_destination           = 'stderr'
log_line_prefix           = '%t [%p] %q%u@%d '
log_min_duration_statement = 1000          # log slow queries >1s
log_checkpoints           = on
log_connections           = off
log_disconnections        = off
log_lock_waits            = on
log_temp_files            = 0
log_autovacuum_min_duration = 500ms

# -----------------------------------------------------------------------------
# ROW SECURITY
# -----------------------------------------------------------------------------
row_security              = on

# -----------------------------------------------------------------------------
# TIMEZONE
# TR: Türkiye saati. Log analizi için UTC de mümkün; değiştirmeyin.
# EN: Turkey timezone. Stored values are always UTC internally.
# -----------------------------------------------------------------------------
timezone                  = 'UTC'
lc_messages               = 'tr_TR.UTF-8'
lc_monetary               = 'tr_TR.UTF-8'
lc_numeric                = 'tr_TR.UTF-8'
lc_time                   = 'tr_TR.UTF-8'

# -----------------------------------------------------------------------------
# pg_cron extension (Phase 3.0 — must be in shared_preload_libraries)
# Previously these lines were added by the Dockerfile after COPYing this
# file, but docker-compose bind-mounts the source file at runtime which
# overrides the baked-in additions. Keeping the canonical config here is
# the only place that survives both build-time and run-time. Fixed
# 2026-04-11 after observing "cron.database_name unknown parameter".
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_cron'
cron.database_name       = 'personel'
