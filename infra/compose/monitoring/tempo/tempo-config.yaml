# =============================================================================
# Personel Platform — Tempo Configuration (Faz 13 #139)
# TR: Grafana Tempo distributed tracing. 7 gün saklama.
# =============================================================================

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_http:
          endpoint: 0.0.0.0:14268

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 168h                   # 7 days retention (#139)

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

querier:
  max_concurrent_queries: 20

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: personel-prod
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
  per_tenant_override_config: /etc/tempo/overrides.yaml

usage_report:
  reporting_enabled: false

# ---------------------------------------------------------------------------
# Example trace queries (operator reference):
#
#   1. DSR erasure end-to-end (KVKK m.11 workflow)
#      { service.name="api" && name="dsr.Erase" } | select(status, trace.id)
#
#   2. Live view ceremony
#      { service.name="api" && name=~"liveview.*" } | trace_duration > 1s
#
#   3. Event ingest latency (agent→ClickHouse)
#      { name="gateway.ingest" } | histogram(trace_duration)
#
#   4. Slow ClickHouse aggregations (>5s)
#      { service.name="api" && name="clickhouse.query" && duration > 5s }
# ---------------------------------------------------------------------------
