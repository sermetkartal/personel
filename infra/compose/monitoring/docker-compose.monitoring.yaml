# =============================================================================
# Personel Platform — Hardened Monitoring Stack (Faz 13 #137 + #138 + #139)
# TR: Prometheus + AlertManager + Grafana + Loki + Promtail + Tempo + exporters
# EN: Side-file; compose with main docker-compose.yaml via -f flag.
#
# Usage:
#   cd infra/compose
#   docker compose \
#     -f docker-compose.yaml \
#     -f monitoring/docker-compose.monitoring.yaml \
#     up -d
#
# Notes:
#   - Main compose already runs prometheus + grafana. This file adds retention,
#     auth, TLS, alertmanager, node/cadvisor/postgres/minio exporters, plus
#     Loki/Promtail (#138) and Tempo (#139).
#   - Grafana datasources for loki + tempo are provisioned from
#     monitoring/grafana-datasources/
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

networks:
  monitoring:
    external: true
    name: compose_monitoring
  app:
    external: true
    name: compose_app

volumes:
  alertmanager-data:
    driver: local
  loki-data:
    driver: local
  tempo-data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # AlertManager (#137)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: personel-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=https://monitoring.personel.local/alertmanager
      - --cluster.listen-address=
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9093:9093"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Loki — log aggregation (#138)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.0
    container_name: personel-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - monitoring
    ports:
      - "127.0.0.1:3100:3100"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Promtail — log shipper for Docker + host (#138)
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.1.0
    container_name: personel-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/host/var/log:ro
      - /var/log/personel:/host/var/log/personel:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring
    depends_on:
      - loki
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Tempo — distributed tracing (#139)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.5.0
    container_name: personel-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./monitoring/tempo/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - monitoring
      - app        # api + gateway + enricher push OTLP spans from app net
    ports:
      - "127.0.0.1:3200:3200"   # tempo http
      - "127.0.0.1:4317:4317"   # OTLP gRPC ingest
      - "127.0.0.1:4318:4318"   # OTLP HTTP ingest
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Exporters (#137)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: personel-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --no-collector.ipvs
    volumes:
      - /:/host:ro,rslave
    pid: host
    network_mode: host
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: personel-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: personel-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres_exporter:${POSTGRES_EXPORTER_PASSWORD:-CHANGEME}@postgres:5432/personel?sslmode=disable"
    networks:
      - monitoring
      - app
    logging: *default-logging

  minio-exporter:
    # MinIO has built-in /minio/v2/metrics/cluster; this is a placeholder for
    # the blackbox-style exporter if needed for per-bucket drill-down.
    image: prom/blackbox-exporter:v0.25.0
    container_name: personel-minio-exporter
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring
    logging: *default-logging
