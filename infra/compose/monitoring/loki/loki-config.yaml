# =============================================================================
# Personel Platform — Loki Configuration (Faz 13 #138)
# TR: 30 gün sıcak, 180 gün soğuk saklama. Multi-tenant label-based.
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://alertmanager:9093

# Retention (#138): 30 days hot
limits_config:
  retention_period: 720h               # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_entries_limit_per_query: 5000
  max_query_series: 500
  max_query_parallelism: 32
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_label_name_length: 1024
  max_label_value_length: 4096
  max_label_names_per_series: 30
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 10MB

compactor:
  working_directory: /loki/retention
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# 180 days cold (object store) scaffold — enable after MinIO bucket provisioned:
# common:
#   storage:
#     s3:
#       endpoint: minio:9000
#       bucketnames: loki-cold
#       access_key_id: ${LOKI_S3_ACCESS_KEY}
#       secret_access_key: ${LOKI_S3_SECRET_KEY}
#       s3forcepathstyle: true
#       insecure: true

analytics:
  reporting_enabled: false
