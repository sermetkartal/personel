# =============================================================================
# Personel Platform — Promtail Configuration (Faz 13 #138)
# TR: Docker container loglarını + /var/log/personel/audit/ + auditd.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      host: ${HOSTNAME}
      cluster: personel-prod

scrape_configs:

  # ---------------------------------------------------------------------------
  # Docker container stdout (all Personel services)
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["com.docker.compose.project=compose"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # Go slog JSON format: {"time":"...","level":"INFO","msg":"...","tenant_id":"..."}
      - json:
          expressions:
            level: level
            msg: msg
            tenant_id: tenant_id
      - labels:
          level:
          tenant_id:
      - output:
          source: msg

  # ---------------------------------------------------------------------------
  # Audit WORM logs — critical, never dropped
  # ---------------------------------------------------------------------------
  - job_name: personel-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: personel-audit
          category: audit
          worm: "true"
          __path__: /host/var/log/personel/audit/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            tenant_id: tenant_id
            action: action
            actor: actor
      - labels:
          level:
          tenant_id:
          action:

  # ---------------------------------------------------------------------------
  # Linux auditd (host-level)
  # ---------------------------------------------------------------------------
  - job_name: auditd
    static_configs:
      - targets:
          - localhost
        labels:
          job: auditd
          category: host-audit
          __path__: /host/var/log/audit/audit.log
    pipeline_stages:
      - regex:
          expression: 'type=(?P<audit_type>\w+) msg=audit\((?P<ts>[^)]+)\)'
      - labels:
          audit_type:

  # ---------------------------------------------------------------------------
  # Systemd / journal logs (optional, if /run/log/journal mounted)
  # ---------------------------------------------------------------------------
  - job_name: systemd
    journal:
      max_age: 12h
      path: /host/var/log/journal
      labels:
        job: systemd
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
      - source_labels: ['__journal__hostname']
        target_label: 'hostname'
