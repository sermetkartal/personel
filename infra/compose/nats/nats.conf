# =============================================================================
# Personel Platform — NATS JetStream Configuration
# JetStream enabled, TLS required, at-rest encryption, operator-mode auth.
# =============================================================================

# Server identity
server_name: personel-nats-1

# Network
host: 0.0.0.0
port: 4222

# HTTP monitoring (internal only)
http_port: 8222

# Cluster port for future multi-node expansion
cluster {
  name:   personel-cluster
  listen: 0.0.0.0:6222
}

# ---------------------------------------------------------------------------
# TLS — all clients must use TLS
# ---------------------------------------------------------------------------
tls {
  cert_file:  "/etc/personel/tls/nats.crt"
  key_file:   "/etc/personel/tls/nats.key"
  ca_file:    "/etc/personel/tls/tenant_ca.crt"
  timeout:    5
  # Client cert verification: enforce mTLS for server-to-server;
  # application users authenticate via credentials (NKey/JWT)
  verify:     false
  min_version: "TLSv1.3"
}

# ---------------------------------------------------------------------------
# JetStream
# ---------------------------------------------------------------------------
jetstream {
  store_dir: "/data/jetstream"

  # At-rest encryption (AES-256-GCM)
  # Key is delivered via environment variable; Vault rotates it.
  key: $NATS_STORE_ENCRYPTION_KEY

  # Storage limits — sized for Phase 1 (500 endpoints)
  # ~2.3 GB/day uncompressed; 7 days retention on bus = ~16 GB
  max_file:   53687091200   # 50 GB
  max_mem:    4294967296    # 4 GB

  # Domain for JetStream cluster; used in multi-server expansion
  domain: personel
}

# ---------------------------------------------------------------------------
# Authorization — Operator/Account/User model (NKey + JWT)
# ---------------------------------------------------------------------------
operator: $NATS_OPERATOR_JWT

# System account for NATS internal subjects
system_account: SYS

# Resolver: push-based account JWT resolver
resolver: MEMORY

# Per-subject limits to prevent runaway producers
max_payload: 8MB
max_control_line: 4KB

# ---------------------------------------------------------------------------
# Limits and safety
# ---------------------------------------------------------------------------
max_connections: 1000
max_subscriptions: 10000
ping_interval: "20s"
ping_max: 3
write_deadline: "10s"

# Prevent slow consumers from blocking fast producers
# (NATS will disconnect subscribers that fall too far behind)
no_slow_consumers: true
max_pending: 67108864  # 64 MB per connection

# ---------------------------------------------------------------------------
# Logging (to stderr, captured by Docker json-file)
# ---------------------------------------------------------------------------
debug:  false
trace:  false
logtime: true

# ---------------------------------------------------------------------------
# Pre-defined JetStream streams
# ---------------------------------------------------------------------------
# These are created idempotently by the install.sh script via nats CLI.
# Defined here as documentation of the intended stream configuration:
#
# Stream: EVENTS
#   subjects:    events.v1.>
#   storage:     file
#   replicas:    1 (Phase 1), 2 (Phase-1-exit)
#   retention:   limits
#   max_age:     7d  (agents have 48h offline buffer; 7d bus retention is headroom)
#   max_msgs:    -1
#   discard:     old
#   compression: s2
#
# Stream: DLP
#   subjects:    dlp.v1.>
#   storage:     file
#   replicas:    1
#   max_age:     48h  (match events are short-lived; persisted in ClickHouse)
#   discard:     old
#   compression: s2
#
# Stream: OPS
#   subjects:    ops.v1.> pki.v1.>
#   storage:     file
#   replicas:    1
#   max_age:     30d
#   discard:     old
#   compression: s2
#
# Stream: DLP_RULES
#   subjects:    dlp.v1.rulebundle.>
#   storage:     file
#   replicas:    1
#   max_age:     7d
#   discard:     old
