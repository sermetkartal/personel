# =============================================================================
# Personel Platform — NATS JetStream Cluster Node 2 (vm5 / 192.168.5.32)
#
# Identical to nats-server.cluster-node1.conf except:
#   - server_name:          personel-nats-02
#   - cluster_advertise:    nats://192.168.5.32:6222
#
# Keep these files in lock-step. If you change one, update the other.
# See the node1 file for full inline documentation.
# =============================================================================

server_name: personel-nats-02
host: 0.0.0.0
port: 4222

http_port: 8222

cluster {
  name:   PersonelCluster
  listen: 0.0.0.0:6222

  routes: [
    "nats://192.168.5.44:6222"
    "nats://192.168.5.32:6222"
  ]

  cluster_advertise: "nats://192.168.5.32:6222"

  tls: {
    cert_file:   "/etc/personel/tls/nats.crt"
    key_file:    "/etc/personel/tls/nats.key"
    ca_file:     "/etc/personel/tls/root_ca.crt"
    timeout:     5
    verify:      true
    min_version: "TLSv1.3"
  }

  no_advertise: false
}

tls {
  cert_file:   "/etc/personel/tls/nats.crt"
  key_file:    "/etc/personel/tls/nats.key"
  ca_file:     "/etc/personel/tls/root_ca.crt"
  timeout:     5
  verify:      false
  min_version: "TLSv1.3"
}

operator: /etc/personel/nats/operator.jwt
system_account: SYS

resolver: {
  type: full
  dir: "/etc/personel/nats/resolver"
  allow_delete: false
  interval: "2m"
}

jetstream {
  store_dir: "/data/jetstream"

  cipher: "chachapoly"
  key:    $NATS_ENCRYPTION_KEY

  max_file_store:   53687091200   # 50 GB
  max_memory_store: 4294967296    # 4 GB

  domain: personel
}

max_payload:      8MB
max_control_line: 4KB
max_connections:  1000
max_subscriptions: 10000
ping_interval:    "20s"
ping_max:         3
write_deadline:   "10s"
max_pending: 67108864

debug:   false
trace:   false
logtime: true
