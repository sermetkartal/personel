# =============================================================================
# Personel Platform — NATS JetStream Cluster Node 1 (vm3 / 192.168.5.44)
#
# This file BUILDS ON nats-server.prod.conf (Wave 1 #47). It is functionally
# identical to the prod single-node config except for the cluster {} stanza,
# the unique server_name, and the cluster_advertise URL. The same operator
# JWT, account JWTs, JetStream encryption key, and TLS material from the
# Wave 1 bootstrap are reused — DO NOT re-run nats-bootstrap.sh.
#
# Prerequisites (identical to prod single-node):
#   /etc/personel/nats/operator.jwt
#   /etc/personel/nats/resolver/                (per-account JWTs)
#   /etc/personel/secrets/nats-encryption.key   (32-byte hex)
#   /etc/personel/nats-creds/{gateway,enricher,api}.creds
#   /etc/personel/tls/{nats.crt,nats.key,root_ca.crt}
#
# The cluster gossip channel uses mTLS with verify=true. The Wave 1 prod
# config left cluster gossip TLS at verify=false because there was no second
# node; with the cluster now formed we MUST enforce mutual cert verification
# on the route channel so that an attacker cannot impersonate a route peer
# and replicate JetStream messages out of band.
#
# 2-NODE QUORUM WARNING:
#   With only two voters, loss of either node halts JetStream writes (no
#   majority). This config is staging-grade. Production needs a 3rd voter
#   (a tiny "arbiter" nats node with no JetStream stream replicas counts).
#   See docs/operations/nats-minio-cluster.md §quorum.
# =============================================================================

server_name: personel-nats-01
host: 0.0.0.0
port: 4222

# HTTP monitoring — bound only to the docker-internal network in compose
http_port: 8222

# ---------------------------------------------------------------------------
# Cluster — 2-node Raft (vm3 + vm5)
# ---------------------------------------------------------------------------
cluster {
  name:   PersonelCluster
  listen: 0.0.0.0:6222

  # Static peer list. Both routes are listed on every node; NATS treats its
  # own listen address as a no-op so this config is symmetric across nodes.
  routes: [
    "nats://192.168.5.44:6222"
    "nats://192.168.5.32:6222"
  ]

  # The address remote peers will use to dial THIS node back. Must be
  # reachable from vm5. Different per-node.
  cluster_advertise: "nats://192.168.5.44:6222"

  # Mutual TLS on the gossip / replication channel. With verify=true a peer
  # cannot join unless it presents a certificate signed by Personel's
  # internal CA (root_ca.crt). The same nats.crt/nats.key are used for both
  # client and route TLS in Phase 1; Phase 2 may split these with a separate
  # nats-cluster cert role.
  tls: {
    cert_file:   "/etc/personel/tls/nats.crt"
    key_file:    "/etc/personel/tls/nats.key"
    ca_file:     "/etc/personel/tls/root_ca.crt"
    timeout:     5
    verify:      true
    min_version: "TLSv1.3"
  }

  # Authoritative no-mesh-leak: the gossip channel will reject any non-route
  # connection. Combined with the data network being internal-only this
  # gives defence in depth.
  no_advertise: false
}

# ---------------------------------------------------------------------------
# TLS — client connections (unchanged from prod single-node)
# ---------------------------------------------------------------------------
tls {
  cert_file:   "/etc/personel/tls/nats.crt"
  key_file:    "/etc/personel/tls/nats.key"
  ca_file:     "/etc/personel/tls/root_ca.crt"
  timeout:     5
  verify:      false
  min_version: "TLSv1.3"
}

# ---------------------------------------------------------------------------
# Operator-mode authorization — identical to prod single-node
# ---------------------------------------------------------------------------
operator: /etc/personel/nats/operator.jwt
system_account: SYS

resolver: {
  type: full
  dir: "/etc/personel/nats/resolver"
  allow_delete: false
  interval: "2m"
}

# ---------------------------------------------------------------------------
# JetStream — at-rest encryption mandatory
#
# IMPORTANT: the encryption key MUST be byte-identical on both nodes,
# otherwise replication will succeed at the Raft layer but the on-disk
# stream files will be unreadable on the peer that holds the wrong key.
# infra/scripts/nats-cluster-bootstrap.sh handles the secure copy.
# ---------------------------------------------------------------------------
jetstream {
  store_dir: "/data/jetstream"

  cipher: "chachapoly"
  key:    $NATS_ENCRYPTION_KEY

  max_file_store:   53687091200   # 50 GB
  max_memory_store: 4294967296    # 4 GB

  # Domain MUST match across cluster nodes for stream replication.
  domain: personel
}

# ---------------------------------------------------------------------------
# Resource limits and safety — identical to prod single-node
# ---------------------------------------------------------------------------
max_payload:      8MB
max_control_line: 4KB
max_connections:  1000
max_subscriptions: 10000
ping_interval:    "20s"
ping_max:         3
write_deadline:   "10s"
max_pending: 67108864  # 64 MB per connection

debug:   false
trace:   false
logtime: true
