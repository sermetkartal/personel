# =============================================================================
# NATS dev config — plain JetStream, no encryption, no TLS, no operator JWT.
# Used by docker-compose.dev.yaml for smoke-test bring-up. The production
# config (nats.conf) requires a NATS_STORE_ENCRYPTION_KEY and operator
# credentials which don't exist on a developer machine.
# =============================================================================

server_name: personel-nats-dev
listen: 0.0.0.0:4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# Dev: no auth. Real deployments use operator-mode with NSC-generated creds.
no_auth_user: admin

accounts {
  SYS {
    users: [{ user: "admin", password: "admin" }]
  }
}
system_account: SYS
