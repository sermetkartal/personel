# =============================================================================
# Personel Platform — NATS Production Configuration (operator-mode)
#
# This is the production-grade NATS server configuration. It differs from
# nats.conf (Phase-1 dev) in three important ways:
#
#   1. Operator JWT is loaded from a FILE on disk rather than an env var,
#      so the operator key material does not leak into `docker inspect`.
#   2. The full file resolver is used, allowing per-account JWT push without
#      a server restart.
#   3. JetStream at-rest encryption is mandatory (chachapoly cipher), with
#      the encryption key delivered via a tmpfs-mounted file outside the
#      configuration tree.
#
# This file is consumed by the production override compose file:
#   infra/compose/nats/docker-compose.prod-override.yaml
#
# Bootstrap MUST be run before NATS will start with this config:
#   sudo infra/scripts/nats-bootstrap.sh
#
# After bootstrap, the following files MUST exist on the host:
#   /etc/personel/nats/operator.jwt           (chmod 644)
#   /etc/personel/nats/resolver/              (chmod 700, per-account JWTs)
#   /etc/personel/secrets/nats-encryption.key (chmod 600, 32 raw bytes hex)
#   /etc/personel/nats-creds/{gateway,enricher,api}.creds (chmod 600)
#
# See docs/operations/nats-prod-auth-migration.md for the migration runbook.
# =============================================================================

server_name: personel-nats-prod
host: 0.0.0.0
port: 4222

# HTTP monitoring — bound only to the docker-internal network in compose
http_port: 8222

# Future cluster expansion — single node in Phase 1
cluster {
  name:   personel-cluster
  listen: 0.0.0.0:6222
}

# ---------------------------------------------------------------------------
# TLS — mandatory for all client and cluster connections
# ---------------------------------------------------------------------------
tls {
  cert_file:   "/etc/personel/tls/nats.crt"
  key_file:    "/etc/personel/tls/nats.key"
  ca_file:     "/etc/personel/tls/root_ca.crt"
  timeout:     5
  # User authentication is delegated to JWT credentials, so we do not require
  # client certificates here. mTLS is reserved for the cluster gossip channel
  # in Phase-1-exit when the second node is added.
  verify:      false
  min_version: "TLSv1.3"
}

# ---------------------------------------------------------------------------
# Operator-mode authorization
# ---------------------------------------------------------------------------
# The operator JWT is the root of trust. It signs the SYS and PersonelMain
# account JWTs, which in turn sign user JWTs (gateway-publisher,
# enricher-consumer, api-controlplane).
operator: /etc/personel/nats/operator.jwt

# Designated system account — required by NATS for internal subjects
# ($SYS.>) and account JWT push notifications. Created by the bootstrap
# script and pushed into the resolver directory.
system_account: SYS

# Full file-based account resolver. Account JWTs land in /etc/personel/nats/
# resolver/<account_pub_key>.jwt. allow_delete:false prevents an admin from
# silently revoking an account JWT without an audit trail.
resolver: {
  type: full
  dir: "/etc/personel/nats/resolver"
  allow_delete: false
  interval: "2m"
}

# ---------------------------------------------------------------------------
# JetStream — at-rest encryption mandatory
# ---------------------------------------------------------------------------
jetstream {
  store_dir: "/data/jetstream"

  # Symmetric stream cipher applied to every file written under store_dir.
  # The key is delivered via the file mount, never via env var, so it does
  # not appear in `docker inspect` output.
  cipher: "chachapoly"
  key:    $NATS_ENCRYPTION_KEY

  # Storage limits — sized for Phase-1 (500 endpoints, 7-day bus retention)
  max_file_store:   53687091200   # 50 GB
  max_memory_store: 4294967296    # 4 GB

  # JetStream domain — preserved across upgrades for replication peers
  domain: personel
}

# ---------------------------------------------------------------------------
# Resource limits and safety
# ---------------------------------------------------------------------------
max_payload:      8MB
max_control_line: 4KB
max_connections:  1000
max_subscriptions: 10000
ping_interval:    "20s"
ping_max:         3
write_deadline:   "10s"

# Slow-consumer protection: producers must never be blocked by a stuck
# subscriber. The enricher must keep up or be evicted.
max_pending: 67108864  # 64 MB per connection

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
debug:   false
trace:   false
logtime: true
