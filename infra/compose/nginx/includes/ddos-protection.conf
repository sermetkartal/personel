# =============================================================================
# Personel Platform — DDoS + Slowloris Protection (Faz 13 #144)
# TR: nginx reverse proxy içine 'include' ile eklenen koruma seti.
# EN: Drop into main nginx http { } block via 'include includes/ddos-protection.conf;'
#
# Usage:
#   http {
#     include /etc/nginx/includes/ddos-protection.conf;
#     ...
#     server { ... limit_req zone=per_ip_aggressive burst=20 nodelay; }
#   }
# =============================================================================

# -----------------------------------------------------------------------------
# Rate-limit zones (layered defense)
# -----------------------------------------------------------------------------

# Global budget — 1000 req/s across all clients (stack-wide protection)
limit_req_zone $server_name zone=global:10m rate=1000r/s;

# Per-IP aggressive — 10 req/s sustained, 20 burst (general browsing)
limit_req_zone $binary_remote_addr zone=per_ip_aggressive:20m rate=10r/s;

# Per-IP strict — 2 req/s (for expensive endpoints: search, reports, DSR list)
limit_req_zone $binary_remote_addr zone=per_ip_strict:20m rate=2r/s;

# Per-IP login — 5 req/min (brute force protection)
limit_req_zone $binary_remote_addr zone=per_ip_login:10m rate=5r/m;

# Per-endpoint route-specific — 100 req/s (API endpoints)
limit_req_zone $request_uri zone=per_endpoint:50m rate=100r/s;

# Connection limits
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_conn_zone $server_name        zone=conn_global:10m;

# -----------------------------------------------------------------------------
# Slowloris protection — close slow clients
# -----------------------------------------------------------------------------
client_body_timeout       10s;
client_header_timeout     10s;
keepalive_timeout         30s;
send_timeout              15s;
reset_timedout_connection on;

# -----------------------------------------------------------------------------
# Request size limits
# -----------------------------------------------------------------------------
client_max_body_size      10m;
client_body_buffer_size   32k;
client_header_buffer_size 2k;
large_client_header_buffers 4 16k;

# -----------------------------------------------------------------------------
# Rate limit status code + logging
# -----------------------------------------------------------------------------
limit_req_status 429;
limit_conn_status 429;
limit_req_log_level warn;

# -----------------------------------------------------------------------------
# User-agent blacklist (common scanners + exploit kits)
# -----------------------------------------------------------------------------
map $http_user_agent $scanner_ua {
    default                                         0;
    "~*sqlmap"                                      1;
    "~*nikto"                                       1;
    "~*nmap"                                        1;
    "~*masscan"                                     1;
    "~*gobuster"                                    1;
    "~*dirbuster"                                   1;
    "~*wpscan"                                      1;
    "~*shodan"                                      1;
    "~*zgrab"                                       1;
    "~*semrushbot"                                  1;
    "~*ahrefsbot"                                   1;
    "~*mj12bot"                                     1;
    "~*blexbot"                                     1;
    "~*petalbot"                                    1;
    "~*dataforseobot"                               1;
    "~*dotbot"                                      1;
    "~*(curl|wget|python-requests)"                 0;  # allow, but monitor
    ""                                              1;  # empty UA — suspicious
}

# -----------------------------------------------------------------------------
# Geofence — country allow/deny (requires ngx_http_geoip2_module + MaxMind)
# -----------------------------------------------------------------------------
# Example enable block — uncomment when GeoIP2 database is in place:
#
# geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
#     $geoip2_country_code source=$remote_addr country iso_code;
# }
#
# map $geoip2_country_code $allowed_country {
#     default 1;            # allow by default
#     RU 0;                 # deny
#     CN 0;
#     KP 0;
#     IR 0;
# }
#
# map $geoip2_country_code $strict_country {
#     default 0;
#     TR 1;                 # only TR allowed for admin endpoints
# }

# -----------------------------------------------------------------------------
# HTTP method restriction
# -----------------------------------------------------------------------------
map $request_method $method_allowed {
    default 0;
    GET 1;
    HEAD 1;
    POST 1;
    PUT 1;
    DELETE 1;
    PATCH 1;
    OPTIONS 1;
}

# -----------------------------------------------------------------------------
# Referrer spam protection
# -----------------------------------------------------------------------------
map $http_referer $referer_spam {
    default                                   0;
    "~*semalt\.com"                           1;
    "~*buttons-for-website\.com"              1;
    "~*darodar\.com"                          1;
    "~*ilovevitaly\.com"                      1;
}

# -----------------------------------------------------------------------------
# Apply defaults to all requests (reference these in server blocks via
# the zone names above)
# -----------------------------------------------------------------------------
