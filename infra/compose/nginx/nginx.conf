#
# Faz 12 #132 — Personel reverse proxy + WAF rules.
#
# Deployment: optional edge proxy in front of api:8000 and console:3000.
# Use with docker-compose override or standalone container.
#
# Scope covered:
#   * Rate limiting (per-IP + per-token + route-specific)
#   * Request size limits
#   * Standard OWASP top-10 mitigation (regex-based WAF lite)
#   * Personel-specific rules for /v1/agent-enroll, /v1/pipeline/replay,
#     /v1/endpoints/*/wipe
#
# NOT a replacement for a full WAF (ModSecurity, Cloudflare, etc).
# For production, see cloudflare-rules.md for an alternative.
#

worker_processes auto;
worker_rlimit_nofile 32768;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;           # Hide nginx version

    # ---- Logging ----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    log_format waf '$remote_addr $time_iso8601 RULE=$waf_rule '
                   'METHOD=$request_method URI=$uri STATUS=$status';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ---- Rate Limit Zones ----
    # Per-IP: 60 requests per minute sustained
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=60r/m;
    # Per-IP strict: 10 requests per minute for sensitive endpoints
    limit_req_zone $binary_remote_addr zone=per_ip_strict:10m rate=10r/m;
    # Per-token (Authorization bearer): 300 requests per minute
    limit_req_zone $http_authorization zone=per_token:20m rate=300r/m;
    # Connection cap
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Rate limit response status
    limit_req_status 429;
    limit_conn_status 429;

    # ---- Request Size Limits ----
    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_max_body_size 10m;    # Default; per-route overrides below
    client_body_timeout 30s;
    client_header_timeout 15s;

    # ---- Common OWASP Top-10 patterns ----
    # These are lite regex-based checks. A proper WAF should replace this.
    map $args $waf_sqli {
        default 0;
        "~*('|%27).*?(union|select|insert|update|delete|drop|--|#|/\*)" 1;
        "~*(select.+from|union.+select|insert.+into|drop.+table)" 1;
    }
    map $args $waf_xss {
        default 0;
        "~*(<script|javascript:|on\w+\s*=|<iframe|<object|<embed)" 1;
        "~*(alert\s*\(|document\.cookie|eval\s*\()" 1;
    }
    map $args $waf_traversal {
        default 0;
        "~*(\.\./|\.\.\\|%2e%2e%2f|%2e%2e/|\.\.%2f)" 1;
        "~*(etc/passwd|boot\.ini|windows/system32)" 1;
    }
    map $args $waf_cmdi {
        default 0;
        "~*(;\s*(ls|cat|id|whoami|uname|ping|nc|bash|sh)\s)" 1;
        "~*(\|\s*(ls|cat|nc|bash)\b)" 1;
        "~*(`\w+`|\$\(\w+\))" 1;
    }
    map $args $waf_lfi {
        default 0;
        "~*(file://|php://|zip://|data://|expect://|phar://)" 1;
    }

    # Request-level composite rule
    map "$waf_sqli$waf_xss$waf_traversal$waf_cmdi$waf_lfi" $waf_rule {
        "00000" "";
        "10000" "SQLi";
        "01000" "XSS";
        "00100" "PathTraversal";
        "00010" "CommandInjection";
        "00001" "LFI";
        default "Composite";
    }

    # ---- Security Headers ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$request_id'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- Upstreams ----
    upstream personel_api {
        server api:8000;
        keepalive 32;
    }
    upstream personel_console {
        server console:3000;
        keepalive 32;
    }
    upstream personel_portal {
        server portal:3001;
        keepalive 32;
    }

    # ---- Default server (drop unknown hosts) ----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }

    # ---- Main HTTPS server ----
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name personel.example.tld;

        # TLS configuration — references mounted certs
        ssl_certificate     /etc/nginx/tls/personel.crt;
        ssl_certificate_key /etc/nginx/tls/personel.key;
        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Global WAF gate — short-circuit if any rule fires
        set $waf_block 0;
        if ($waf_sqli) { set $waf_block 1; }
        if ($waf_xss) { set $waf_block 1; }
        if ($waf_traversal) { set $waf_block 1; }
        if ($waf_cmdi) { set $waf_block 1; }
        if ($waf_lfi) { set $waf_block 1; }

        # Forbid suspicious user agents
        if ($http_user_agent ~* "sqlmap|nikto|nmap|masscan|w3af|acunetix|burp|dirbuster|gobuster|wpscan") {
            return 403;
        }

        # Forbid suspicious request methods
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
            return 405;
        }

        # Global rate limit + connection cap
        limit_req zone=per_ip burst=20 nodelay;
        limit_conn conn_per_ip 50;

        # ================================================================
        # Route: /v1/agent-enroll  — strict mTLS + low rate limit
        # ================================================================
        location = /v1/agent-enroll {
            if ($waf_block = 1) { return 403; }
            limit_req zone=per_ip_strict burst=5 nodelay;
            client_max_body_size 8k;

            # Require client cert (mTLS) — terminator upstream
            # Note: nginx ssl_verify_client is optional here because
            # gateway performs the actual mTLS verification. We defence-in-depth
            # by rejecting obviously malformed requests.

            proxy_pass http://personel_api;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
            access_log /var/log/nginx/enroll.log main;
        }

        # ================================================================
        # Route: /v1/pipeline/replay — DPO only (upstream RBAC)
        # WAF adds IP allowlist as defence in depth.
        # ================================================================
        location = /v1/pipeline/replay {
            if ($waf_block = 1) { return 403; }
            limit_req zone=per_ip_strict burst=2 nodelay;
            client_max_body_size 64k;

            # Defence in depth: IP allowlist from admin subnet.
            # Customer edits this list to match their VPN/jump host range.
            # Empty allow = disabled (upstream RBAC is authoritative).
            # allow 10.0.100.0/24;   # Example: admin VPN
            # deny  all;

            proxy_pass http://personel_api;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            access_log /var/log/nginx/replay.log main;
        }

        # ================================================================
        # Route: /v1/endpoints/*/wipe  — always audit, rate limit
        # ================================================================
        location ~ ^/v1/endpoints/[^/]+/wipe$ {
            if ($waf_block = 1) { return 403; }
            limit_req zone=per_ip_strict burst=3 nodelay;
            client_max_body_size 4k;

            access_log /var/log/nginx/wipe.log main;   # Separate audit file

            proxy_pass http://personel_api;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # ================================================================
        # Route: /v1/endpoints/bulk  — bulk operations strictly throttled
        # ================================================================
        location = /v1/endpoints/bulk {
            if ($waf_block = 1) { return 403; }
            limit_req zone=per_ip_strict burst=1 nodelay;
            client_max_body_size 512k;

            proxy_pass http://personel_api;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            access_log /var/log/nginx/bulk.log main;
        }

        # ================================================================
        # WebSocket — audit stream
        # ================================================================
        location /v1/audit/stream {
            if ($waf_block = 1) { return 403; }
            proxy_pass http://personel_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 3600s;     # Long-lived WS
            limit_conn conn_per_ip 5;     # Max 5 WS per IP
        }

        # ================================================================
        # Generic API — /v1/*
        # ================================================================
        location /v1/ {
            if ($waf_block = 1) { return 403; }
            limit_req zone=per_ip burst=30 nodelay;
            limit_req zone=per_token burst=50 nodelay;

            proxy_pass http://personel_api;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
        }

        # ================================================================
        # Console — Next.js admin UI
        # ================================================================
        location / {
            if ($waf_block = 1) { return 403; }
            proxy_pass http://personel_console;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # ================================================================
        # Healthcheck (bypass rate limit, local only)
        # ================================================================
        location = /healthz {
            access_log off;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            return 200 "ok\n";
        }

        # Drop attempts to access hidden files
        location ~ /\.(ht|git|env|DS_Store) {
            deny all;
            return 403;
        }
    }
}
