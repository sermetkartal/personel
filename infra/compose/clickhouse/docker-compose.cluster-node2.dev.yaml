name: personel-cluster-node2

# =============================================================================
# Personel Platform - ClickHouse Cluster Node 2 DEV (vm5, 192.168.5.32)
# Standalone compose for the second ClickHouse replica + second keeper.
# Dev mode: host network, no TLS, no interserver auth, LAN IPs.
#
# Usage on vm5:
#   cd /home/kartal/personel/infra/compose/clickhouse
#   docker compose -f docker-compose.cluster-node2.dev.yaml up -d
# =============================================================================

services:

  clickhouse-02:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: personel-clickhouse-02
    hostname: clickhouse-02
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: personel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_app_pass}
      CLICKHOUSE_ADMIN_PASSWORD_SHA256: ${CLICKHOUSE_ADMIN_PASSWORD_SHA256:-119def00bc802509ac5de301b83c39615b0c500e5215e64d9efd78dfed78c548}
      CLICKHOUSE_APP_PASSWORD_SHA256: ${CLICKHOUSE_APP_PASSWORD_SHA256:-0316338436459b7f7cbc3d71dec30a8864f2141dd42849f73e71860ddf11d95b}
      CH_INTERSERVER_HOST: "192.168.5.32"
    volumes:
      - clickhouse-02-data:/var/lib/clickhouse
      - ./config.xml:/etc/clickhouse-server/config.xml:ro
      - ./users.xml:/etc/clickhouse-server/users.xml:ro
      - ./macros-02.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./config.cluster.dev.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./ports-02.dev.xml:/etc/clickhouse-server/config.d/ports.xml:ro
      - /etc/personel/tls:/etc/personel/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:8123/ping' | grep -q Ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g

  keeper-02:
    image: clickhouse/clickhouse-keeper:24.3-alpine
    container_name: personel-keeper-02
    hostname: keeper-02
    restart: unless-stopped
    network_mode: host
    user: "0:0"
    volumes:
      - keeper-02-data:/var/lib/clickhouse/coordination
      - ./keeper-config-02.dev.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | (exec 3<>/dev/tcp/127.0.0.1/9181 && cat >&3 && timeout 2 cat <&3) | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  clickhouse-02-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/personel/clickhouse-02
  keeper-02-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/personel/keeper-02
