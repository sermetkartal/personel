name: SLSA Provenance

# Faz 12 #131 — SLSA Level 2 provenance generation on release.
# Staging: infra/ci-scaffolds/slsa-provenance.yml
# Operator: mv to .github/workflows/ with workflow-scope PAT.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write   # For keyless Sigstore signing
  contents: write   # Attach provenance to release
  actions: read     # slsa-generator reads the workflow run

jobs:
  # -------------------------------------------------------------------------
  # 1. Build Go binaries (api, gateway, enricher)
  # -------------------------------------------------------------------------
  build-go:
    name: Build Go binaries
    runs-on: ubuntu-latest
    outputs:
      api-digest: ${{ steps.hash.outputs.api-digest }}
      gateway-digest: ${{ steps.hash.outputs.gateway-digest }}
      enricher-digest: ${{ steps.hash.outputs.enricher-digest }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: |
          mkdir -p dist
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          for proj in api gateway enricher; do
            if [ "$proj" = "api" ]; then dir=apps/api; else dir=apps/gateway; fi
            (cd $dir && CGO_ENABLED=0 GOFLAGS=-trimpath \
              go build -trimpath -buildvcs=false \
              -ldflags='-s -w -buildid=' \
              -o ../../dist/$proj ./cmd/$proj)
          done

      - name: Compute digests
        id: hash
        run: |
          cd dist
          {
            echo "hashes=$(sha256sum * | base64 -w0)"
            echo "api-digest=sha256:$(sha256sum api | awk '{print $1}')"
            echo "gateway-digest=sha256:$(sha256sum gateway | awk '{print $1}')"
            echo "enricher-digest=sha256:$(sha256sum enricher | awk '{print $1}')"
          } >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: dist/
          retention-days: 30

  # -------------------------------------------------------------------------
  # 2. Generate provenance using reusable workflow
  # -------------------------------------------------------------------------
  provenance-go:
    name: SLSA provenance (Go)
    needs: [build-go]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build-go.outputs.hashes }}
      upload-assets: true   # attach to release if tag
      provenance-name: personel-go.intoto.jsonl

  # -------------------------------------------------------------------------
  # 3. Build Rust agent (Windows)
  # -------------------------------------------------------------------------
  build-rust:
    name: Build Rust agent
    runs-on: windows-latest
    outputs:
      agent-digest: ${{ steps.hash.outputs.digest }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
      - name: Build release
        working-directory: apps/agent
        env:
          RUSTFLAGS: '--remap-path-prefix=/=.'
        run: cargo build --release --locked

      - name: Compute digest
        id: hash
        shell: bash
        run: |
          cd apps/agent/target/release
          ls -la
          mkdir -p ../../../../dist-rust
          cp personel-agent.exe personel-watchdog.exe enroll.exe ../../../../dist-rust/ 2>/dev/null || true
          cd ../../../../dist-rust
          {
            echo "digest=sha256:$(sha256sum personel-agent.exe | awk '{print $1}')"
            echo "hashes=$(sha256sum * | base64 -w0)"
          } >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: rust-agent-binaries
          path: dist-rust/

  provenance-rust:
    name: SLSA provenance (Rust)
    needs: [build-rust]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build-rust.outputs.hashes }}
      upload-assets: true
      provenance-name: personel-rust.intoto.jsonl
