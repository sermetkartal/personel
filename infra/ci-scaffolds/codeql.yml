name: CodeQL

# Faz 12 #127 — SAST via GitHub CodeQL for Go, TypeScript, Python.
# Staging: infra/ci-scaffolds/codeql.yml
# Operator: mv to .github/workflows/ with workflow-scope PAT.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 2 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - 'apps/qa/cmd/simulator/**'
              - '**/*_test.go'
              - '**/testdata/**'

      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: '1.25'

      - name: Build Go projects
        if: matrix.language == 'go'
        run: |
          for proj in apps/api apps/gateway apps/qa; do
            if [ -f "$proj/go.mod" ]; then
              (cd "$proj" && go build ./... || echo "::warning::$proj build failed, continuing")
            fi
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          upload: always
