# =============================================================================
# Personel Platform — Secret Rotation Inventory
# =============================================================================
# Source of truth for which static secrets (passwords, AppRole secret IDs,
# admin keys) are subject to automated rotation, how often, and how to
# reload + verify each consumer.
#
# Consumed by: infra/scripts/rotate-secrets.sh
#
# Rotation cadence rationale (DPO-approved):
#   - 30 days for high-value privilege boundaries (Vault AppRole secret IDs,
#     Keycloak admin password). Compromise of these grants tenant-wide blast
#     radius; SOC 2 CC6.1 expects sub-quarterly rotation.
#   - 90 days for database role passwords and object-store root credentials.
#     These have narrower blast radius (one schema or one bucket pool) and
#     pay a higher operational cost to rotate (compose restart cascade).
#
# Changing a cadence requires a DPO sign-off entry in the audit log
# (action=secret_rotation.cadence_changed). See secret-rotation.md.
#
# Field reference:
#   name              unique identifier; also the basename of the file under
#                     /etc/personel/secrets/
#   type              postgres-role | vault-approle-secret-id |
#                     minio-root | keycloak-admin
#   role              the underlying role/user the secret authenticates as
#                     (postgres role name, vault approle name, etc.)
#   length            random secret length in characters (charset: a-zA-Z0-9)
#   rotate_every_days schedule cadence
#   reload_cmd        host shell command run after the new secret is written
#                     to *.new but before verification. Empty string = no
#                     reload needed (live pickup).
#   verify_cmd        host shell command that MUST exit 0 with the new secret
#                     in /etc/personel/secrets/<name>.new in order for the
#                     atomic swap to occur. The script exposes the new secret
#                     via NEW_SECRET environment variable too.
# =============================================================================

secrets:
  # ---- Postgres role passwords (90d) --------------------------------------
  - name: postgres-app-admin-api
    type: postgres-role
    role: app_admin_api
    length: 32
    rotate_every_days: 90
    reload_cmd: docker compose restart api
    verify_cmd: |
      docker exec -e PGPASSWORD="${NEW_SECRET}" personel-postgres \
        psql -h 127.0.0.1 -U app_admin_api -d personel -c "SELECT 1" >/dev/null

  - name: postgres-personel-enricher
    type: postgres-role
    role: personel_enricher
    length: 32
    rotate_every_days: 90
    reload_cmd: docker compose restart enricher
    verify_cmd: |
      docker exec -e PGPASSWORD="${NEW_SECRET}" personel-postgres \
        psql -h 127.0.0.1 -U personel_enricher -d personel -c "SELECT 1" >/dev/null

  - name: postgres-personel-gw
    type: postgres-role
    role: personel_gw
    length: 32
    rotate_every_days: 90
    reload_cmd: docker compose restart gateway
    verify_cmd: |
      docker exec -e PGPASSWORD="${NEW_SECRET}" personel-postgres \
        psql -h 127.0.0.1 -U personel_gw -d personel -c "SELECT 1" >/dev/null

  # ---- Vault AppRole secret IDs (30d) -------------------------------------
  - name: vault-approle-api-service
    type: vault-approle-secret-id
    role: api-service
    rotate_every_days: 30
    reload_cmd: docker compose restart api
    verify_cmd: |
      curl -fsS http://127.0.0.1:8000/healthz >/dev/null

  - name: vault-approle-gateway-service
    type: vault-approle-secret-id
    role: gateway-service
    rotate_every_days: 30
    reload_cmd: docker compose restart gateway
    verify_cmd: |
      curl -fsSk https://127.0.0.1:9443/healthz >/dev/null || \
      docker exec personel-gateway pgrep -f gateway >/dev/null

  - name: vault-approle-enricher-service
    type: vault-approle-secret-id
    role: enricher-service
    rotate_every_days: 30
    reload_cmd: docker compose restart enricher
    verify_cmd: |
      docker exec personel-enricher pgrep -f enricher >/dev/null

  # ---- MinIO root (90d) ---------------------------------------------------
  - name: minio-root-access-key
    type: minio-root
    length: 64
    rotate_every_days: 90
    reload_cmd: docker compose restart minio
    verify_cmd: |
      docker exec personel-minio mc admin info local/ >/dev/null

  # ---- Keycloak admin (30d) -----------------------------------------------
  - name: keycloak-admin-password
    type: keycloak-admin
    length: 24
    rotate_every_days: 30
    reload_cmd: ""
    verify_cmd: |
      curl -fsS -X POST http://127.0.0.1:8080/realms/master/protocol/openid-connect/token \
        -d "grant_type=password" -d "client_id=admin-cli" \
        -d "username=admin" -d "password=${NEW_SECRET}" | grep -q access_token
