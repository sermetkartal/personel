syntax = "proto3";

package personel.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/personel/proto/personel/v1;personelv1";

// Shared identifier types. All IDs are UUIDv4 byte-encoded (16 bytes) unless
// stated otherwise. Strings are used for external display ids only.
message TenantId { bytes value = 1; }
message EndpointId { bytes value = 1; }
message UserId { bytes value = 1; }
message SessionId { bytes value = 1; }
message PolicyId { bytes value = 1; }
message EventId { bytes value = 1; } // ULID, 16 bytes

// User SID (Windows) in S-1-5-... canonical string form.
message WindowsUserSid { string value = 1; }

// Semantic version of the agent.
message AgentVersion {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
  string build = 4; // optional build tag
}

// Hardware fingerprint used at enrollment. Opaque to the server; server only
// persists and compares for replay detection.
message HardwareFingerprint {
  bytes blob = 1; // 32 bytes; derivation defined in agent docs
}

// PII classification per KVKK event taxonomy.
enum PiiClass {
  PII_CLASS_UNSPECIFIED = 0;
  PII_CLASS_NONE = 1;
  PII_CLASS_IDENTIFIER = 2;
  PII_CLASS_BEHAVIORAL = 3;
  PII_CLASS_CONTENT = 4;
  PII_CLASS_SENSITIVE = 5;
}

// Retention class per data retention matrix.
enum RetentionClass {
  RETENTION_CLASS_UNSPECIFIED = 0;
  RETENTION_CLASS_HOT = 1;
  RETENTION_CLASS_WARM = 2;
  RETENTION_CLASS_COLD = 3;
  RETENTION_CLASS_PURGE = 4;
}

// Severity for alerts/health/tamper events.
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_LOW = 2;
  SEVERITY_MEDIUM = 3;
  SEVERITY_HIGH = 4;
  SEVERITY_CRITICAL = 5;
}

// Envelope metadata stamped on every event.
message EventMeta {
  EventId event_id = 1;
  string event_type = 2;            // canonical dotted name, e.g. "process.start"
  uint32 schema_version = 3;
  TenantId tenant_id = 4;
  EndpointId endpoint_id = 5;
  WindowsUserSid user_sid = 6;
  google.protobuf.Timestamp occurred_at = 7;
  google.protobuf.Timestamp received_at = 8; // server-stamped
  AgentVersion agent_version = 9;
  uint64 seq = 10;                  // per-endpoint monotonic
  PiiClass pii = 11;
  RetentionClass retention = 12;

  // --- Phase 2 enrichment slots (forward-compat reservation) -----------
  // These tags are claimed NOW so Phase 2 enricher changes (ML category
  // classifier, OCR output, sensitivity guard flag lifting, HRIS user
  // resolution) don't need a breaking schema bump. Phase 1 servers ignore
  // unknown fields; agents never emit them. The enricher in Phase 2 will
  // populate these server-side before the ClickHouse insert.
  //
  // DO NOT re-use these tag numbers for other purposes.

  // ML category classifier result (ADR 0017). One of: work, personal,
  // distraction, unknown. Empty string = not yet classified.
  string category = 13;

  // ML classifier confidence [0.0, 1.0]. Phase 2 uses 0.70 threshold to
  // decide "unknown" fallback.
  float category_confidence = 14;

  // Sensitivity-guard flag set by Phase 1 enricher; lifted here for
  // ClickHouse column routing. Phase 1 already routes via prefix; Phase 2
  // may also filter downstream queries on this.
  bool sensitive_flagged = 15;

  // HRIS-resolved user attributes; the enricher joins endpoint_id →
  // users.hris_id for filtering in reports and DSR scoping.
  string hris_department = 16;
  string hris_manager_user_id = 17;

  // OCR language hint for Phase 2 OCR pipeline (ADR pending). Empty if
  // OCR is not enabled for this tenant.
  string ocr_language = 18;

  // Raw collector payload (JSON-serialised) — the agent emits all
  // collector outputs as JSON because the Phase-1 collectors don't yet
  // have per-kind proto messages. The enricher reads this field via
  // `meta.event_type` dispatch and writes the JSON straight into the
  // ClickHouse `payload` column. Phase 2+ collectors that have real
  // proto payloads will populate Event.payload oneof instead and leave
  // this field empty.
  string raw_payload_json = 19;

  // Reserved block for future enrichment. Claimed so nothing else grabs
  // these tag numbers.
  reserved 20 to 30;
  reserved "reserved_phase_2_enrichment_20",
           "reserved_phase_2_enrichment_21",
           "reserved_phase_2_enrichment_22",
           "reserved_phase_2_enrichment_23",
           "reserved_phase_2_enrichment_24",
           "reserved_phase_2_enrichment_25",
           "reserved_phase_2_enrichment_26",
           "reserved_phase_2_enrichment_27",
           "reserved_phase_2_enrichment_28",
           "reserved_phase_2_enrichment_29",
           "reserved_phase_2_enrichment_30";
}
